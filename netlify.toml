# Netlify Configuration for "Città del Cittadino Digitale"

# Build settings
[build]
  command = ""
  publish = "/"

# Cache settings for different file types
[[headers]]
  for = "/assets/models/**/*.glb"
  [headers.values]
    # Cache 3D models for 30 days (aggressive caching)
    Cache-Control = "public, max-age=2592000, immutable"
    # Enable CORS for the model
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/assets/vendor/**/*.js"
  [headers.values]
    # Cache vendor libraries for 1 year
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/**/*.css"
  [headers.values]
    # Cache CSS for 1 year
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/**/*.js"
  [headers.values]
    # Cache app scripts for 30 days
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    # Don't cache HTML pages to get fresh content on refresh
    Cache-Control = "public, max-age=3600"
    # Enable service worker scope
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    # Never cache service worker itself
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"
